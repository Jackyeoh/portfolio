<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jack Yeoh — Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@300;400;500;600;700&family=Saira:wght@300;400;500;600&family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    /* ===================== DESIGN TOKENS ===================== */
    :root {
      /* warm near-black foundation (Endfield is warm, not blue) */
      --bg:        #0c0b08;
      --bg-2:      #100e0a;
      --surface:   #16130d;
      --surface-2: #1d1810;
      --line:        rgba(241,235,221,0.10);
      --line-strong: rgba(241,235,221,0.20);

      --fg:       #f1ebdd;
      --fg-dim:   rgba(241,235,221,0.66);
      --fg-faint: rgba(241,235,221,0.40);
      --fg-ghost: rgba(241,235,221,0.16);

      /* signature + harmonized category accents (shared chroma band) */
      --amber:  #ffb000;
      --c-game: oklch(0.80 0.135 82);
      --c-dev:  oklch(0.78 0.090 232);
      --c-num:  oklch(0.72 0.130 42);
      --c-ui:   oklch(0.72 0.095 305);

      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-in: cubic-bezier(0.5, 0, 0.75, 0);

      /* 'Noto Sans SC' is appended as a per-glyph fallback so CJK characters
         render cleanly in Chinese while Latin glyphs keep the Saira identity. */
      --font-display: 'Saira Condensed', 'Noto Sans SC', system-ui, sans-serif;
      --font-body: 'Saira', 'Noto Sans SC', system-ui, sans-serif;
      --font-mono: 'Space Mono', 'Noto Sans SC', ui-monospace, monospace;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); }
    body {
      font-family: var(--font-body);
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow: hidden;
    }
    #root { height: 100vh; }

    /* fluid display scale */
    .font-display { font-family: var(--font-display); }
    .font-mono { font-family: var(--font-mono); }
    .mono-label {
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 10px;
      color: var(--fg-faint);
    }

    /* a quiet, warm dot field — the ambient grid, dialed down */
    .dotfield {
      position: absolute; inset: 0;
      background-image: radial-gradient(circle at center, rgba(255,176,0,0.16) 1px, transparent 1.6px);
      background-size: 46px 46px;
      -webkit-mask-image: radial-gradient(ellipse 70% 65% at 50% 45%, #000 30%, transparent 78%);
      mask-image: radial-gradient(ellipse 70% 65% at 50% 45%, #000 30%, transparent 78%);
      transition: opacity 1s var(--ease), transform 1.2s var(--ease);
    }

    /* vignette + faint grain to keep panels from feeling flat */
    .vignette { background: radial-gradient(ellipse 90% 80% at 50% 38%, transparent 40%, rgba(0,0,0,0.55) 100%); }

    /* scrollbars */
    .scroll-thin::-webkit-scrollbar { width: 5px; height: 5px; }
    .scroll-thin::-webkit-scrollbar-track { background: transparent; }
    .scroll-thin::-webkit-scrollbar-thumb { background: rgba(241,235,221,0.16); border-radius: 4px; }
    .scroll-thin::-webkit-scrollbar-thumb:hover { background: rgba(241,235,221,0.34); }

    /* slow rotation for decorative rings */
    @keyframes spin360 { to { transform: rotate(360deg); } }
    @keyframes spin360r { to { transform: rotate(-360deg); } }
    @keyframes sweep { 0% { transform: translateY(-100%); } 100% { transform: translateY(220%); } }
    @keyframes flicker { 0%,100%{opacity:1} 92%{opacity:1} 94%{opacity:0.55} 96%{opacity:1} }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
    @keyframes core-pulse {
      0%,100% { box-shadow: 0 0 8px rgba(255,176,0,0.04); }
      50%     { box-shadow: 0 0 28px rgba(255,176,0,0.16); }
    }
    @keyframes core-pulse-label {
      0%,100% { opacity: 0.8; }
      50%     { opacity: 0.42; }
    }

    .reduce-motion *, .reduce-motion *::before, .reduce-motion *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
    }

    /* selection */
    ::selection { background: rgba(255,176,0,0.28); color: #fff; }

    /* link reset */
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }
  </style>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Saira Condensed', 'Noto Sans SC', 'sans-serif'],
            body: ['Saira', 'Noto Sans SC', 'sans-serif'],
            mono: ['Space Mono', 'Noto Sans SC', 'monospace'],
          },
          colors: {
            bg: 'var(--bg)',
            surface: 'var(--surface)',
            fg: 'var(--fg)',
            amber: 'var(--amber)',
          },
        },
      },
    };
  </script>

  <!-- thumbnail used by the offline bundler -->
  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="#0c0b08"/>
      <circle cx="50" cy="50" r="26" fill="none" stroke="#ffb000" stroke-width="0.8" opacity="0.5"/>
      <circle cx="50" cy="50" r="17" fill="none" stroke="#ffb000" stroke-width="0.8" opacity="0.3"/>
      <rect x="46" y="46" width="8" height="8" fill="#ffb000" transform="rotate(45 50 50)"/>
      <text x="50" y="84" fill="#ffb000" font-family="monospace" font-size="9" text-anchor="middle" letter-spacing="2">JY</text>
    </svg>
  </template>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>

</html>
